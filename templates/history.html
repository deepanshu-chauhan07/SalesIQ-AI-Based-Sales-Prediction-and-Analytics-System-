<!DOCTYPE html>
<html>
<head>
<title>History</title>
<style>
body {
    background:black;
    color:white;
    font-family:Arial;
    text-align:center;
}
table {
    margin:auto;
    border-collapse: collapse;
}
td, th {
    border:1px solid red;
    padding:10px;
}
</style>
</head>

<body>

<h2>📁 Your History</h2>

<table>
<tr>
    <th>ID</th>
    <th>Total Rows</th>
    <th>Avg Sales</th>
    <th>Date</th>
</tr>

{% for row in data %}
<tr>
    <td>{{ row[0] }}</td>
    <td>{{ row[2] }}</td>
    <td>{{ row[3] }}</td>
    <td>{{ row[4] }}</td>
</tr>
{% endfor %}
</table>

<br>
<a href="/home">⬅ Back</a>

</body>
</html>
