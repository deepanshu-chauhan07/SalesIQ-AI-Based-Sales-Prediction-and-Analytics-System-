<!DOCTYPE html>
<html>
<head>
    <title>Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI';
            background: linear-gradient(135deg, #0f0f0f, #1a0000);
            color: white;
        }

        .container {
            max-width: 1100px;
            margin: auto;
            padding: 20px;
        }

        h2 {
            text-align: center;
        }

        /* 🔥 STATS */
        .stats {
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
            margin: 20px 0;
        }

        .stat-box {
            background: rgba(255,0,0,0.1);
            padding: 12px 20px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(255,0,0,0.3);
            transition: 0.3s;
        }

        .stat-box:hover {
            transform: scale(1.05);
            box-shadow: 0 0 25px rgba(255,0,0,0.8);
        }

        /* 🔥 GRID */
        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .card {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(15px);
            border-radius: 12px;
            padding: 15px;
            box-shadow: 0 0 20px rgba(255,0,0,0.2);
            transition: 0.3s;
        }

        .card:hover {
            transform: translateY(-5px) scale(1.01);
            box-shadow: 0 0 40px rgba(255,0,0,0.6);
        }

        canvas {
            width: 100% !important;
            height: 300px !important;
        }

        /* 📱 MOBILE */
        @media (max-width: 768px) {
            .grid {
                grid-template-columns: 1fr;
            }
            canvas {
                height: 250px !important;
            }
        }

        /* 🔗 LINKS */
        .links {
            text-align: center;
            margin-top: 20px;
        }

        .links a {
            display: inline-block;
            margin: 8px;
            color: #ff4d4d;
            text-decoration: none;
            transition: 0.3s;
        }

        .links a:hover {
            color: white;
            text-shadow: 0 0 10px red;
            transform: scale(1.05);
        }

        /* 🔥 BACKGROUND GLOW */
        body::before {
            content: "";
            position: fixed;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255,0,0,0.08), transparent);
            animation: moveBg 10s linear infinite;
            z-index: -1;
        }

        @keyframes moveBg {
            0% { transform: translate(0,0); }
            50% { transform: translate(-50px,-50px); }
            100% { transform: translate(0,0); }
        }
    </style>
</head>

<body>

<div class="container">

    <h2>📊 Analytics Dashboard</h2>

    <!-- 🔢 STATS -->
    <div class="stats">
        <div class="stat-box">Total: {{ total_rows }}</div>
        <div class="stat-box">Avg: {{ avg_sales }}</div>
        <div class="stat-box">Max: {{ max_sales }}</div>
    </div>

    <!-- 📊 CHARTS -->
    <div class="grid">
        <div class="card">
            <canvas id="lineChart"></canvas>
        </div>

        <div class="card">
            <canvas id="barChart"></canvas>
        </div>
    </div>

    <div class="card" style="margin-top:20px;">
        <canvas id="pieChart"></canvas>
    </div>

    <!-- 🔗 LINKS -->
    <div class="links">
        <a href="/upload">⬅ Upload Again</a>
        <a href="/history">📁 View History</a>
        <a href="/download">⬇ Download CSV</a>
        <a href="/download_pdf">📄 Download PDF</a>
    </div>

</div>

<script>
const prices = {{ prices | tojson }};
const sales = {{ sales | tojson }};
const titles = {{ titles | tojson }};

const p = prices.slice(0, 20);
const s = sales.slice(0, 20);
const t = titles.slice(0, 20);

// 🔥 LINE CHART
new Chart(document.getElementById("lineChart"), {
    type: 'line',
    data: {
        labels: t,
        datasets: [{
            label: "Sales Trend",
            data: s,
            borderColor: "#ff3b3b",
            backgroundColor: "rgba(255,0,0,0.15)",
            fill: true,
            tension: 0.4,
            pointRadius: 4,
            pointHoverRadius: 8,
            pointBackgroundColor: "#ff0000"
        }]
    },
    options: {
        plugins: {
            legend: { labels: { color: "white" } },
            tooltip: {
                backgroundColor: "#111",
                bodyColor: "#ff4d4d",
                borderColor: "red",
                borderWidth: 1
            }
        }
    }
});

// 🔥 BAR CHART
new Chart(document.getElementById("barChart"), {
    type: 'bar',
    data: {
        labels: t.slice(0,10).map(x => x.substring(0,10)+"..."),
        datasets: [{
            label: "Top Products",
            data: s.slice(0,10),
            backgroundColor: "#ff4d4d",
            hoverBackgroundColor: "#ff0000"
        }]
    },
    options: {
        plugins: {
            legend: { labels: { color: "white" } }
        }
    }
});

// 🔥 PIE CHART
let low = s.filter(x => x < 20).length;
let mid = s.filter(x => x >=20 && x <40).length;
let high = s.filter(x => x >=40).length;

new Chart(document.getElementById("pieChart"), {
    type: 'pie',
    data: {
        labels: ["Low", "Medium", "High"],
        datasets: [{
            data: [low, mid, high],
            backgroundColor: ["#00ff88", "#ffaa00", "#ff3b3b"]
        }]
    },
    options: {
        plugins: {
            legend: { labels: { color: "white" } }
        }
    }
});
</script>

</body>
</html>
