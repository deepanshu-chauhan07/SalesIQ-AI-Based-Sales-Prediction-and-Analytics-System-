<!DOCTYPE html>
<html>
<head>
<title>Login</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Segoe UI', sans-serif;
}

/* Background */
body {
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: radial-gradient(circle at center, #1a0000, #000);
    overflow: hidden;
}

/* PARTICLES */
canvas {
    position: fixed;
    top: 0;
    left: 0;
    z-index: 0;
}

/* CURSOR GLOW */
.cursor {
    position: fixed;
    width: 200px;
    height: 200px;
    background: radial-gradient(circle, rgba(255,0,0,0.3), transparent);
    pointer-events: none;
    transform: translate(-50%, -50%);
    z-index: 1;
}

/* Floating words */
.floating-bg span {
    position: absolute;
    color: rgba(255,0,0,0.1);
    font-size: 40px;
    animation: float 12s infinite ease-in-out;
}

@keyframes float {
    0%,100% { transform: translateY(0); }
    50% { transform: translateY(-40px); }
}

/* Glass Card */
.card {
    position: relative;
    z-index: 2;
    width: 380px;
    padding: 30px;
    border-radius: 20px;
    backdrop-filter: blur(30px);
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,0,0,0.2);
    box-shadow: 0 0 40px rgba(255,0,0,0.3);
}

/* Typing text */
.typing {
    text-align: center;
    font-size: 22px;
    margin-bottom: 20px;
    color: white;
}

/* Inputs */
input {
    width: 100%;
    padding: 12px;
    margin: 10px 0;
    border-radius: 10px;
    border: none;
    outline: none;
    background: rgba(255,255,255,0.1);
    color: white;
    transition: 0.3s;
}

input:focus {
    box-shadow: 0 0 10px red;
}

/* Button */
button {
    width: 100%;
    padding: 12px;
    border-radius: 12px;
    border: none;
    background: linear-gradient(45deg, red, #ff1a1a);
    color: white;
    cursor: pointer;
}

/* Error */
.error-box {
    background: rgba(255,0,0,0.2);
    padding: 10px;
    border-radius: 8px;
    text-align: center;
    margin-bottom: 10px;
}

/* Link */
.link {
    text-align: center;
    margin-top: 10px;
}
</style>
</head>

<body>

<!-- PARTICLES -->
<canvas id="particles"></canvas>

<!-- CURSOR GLOW -->
<div class="cursor" id="cursor"></div>

<!-- FLOATING WORDS -->
<div class="floating-bg">
    <span style="top:10%;left:10%;">AI</span>
    <span style="top:30%;left:70%;">DATA</span>
    <span style="top:60%;left:20%;">LOGIN</span>
    <span style="top:80%;left:60%;">SECURE</span>
</div>

<!-- MAIN CARD -->
<div class="card">

    <div class="typing" id="typing"></div>

    {% if error %}
    <div class="error-box">❌ {{ error }}</div>
    {% endif %}

    <form method="post">
        <input type="text" name="username" placeholder="Username">
        <input type="password" name="password" placeholder="Password">
        <button type="submit">Login</button>
    </form>

    <div class="link">
        <a href="/register">Register</a>
    </div>

</div>

<script>
// TYPING EFFECT
const text = "Welcome Back 🚀";
let i = 0;
function type() {
    if (i < text.length) {
        document.getElementById("typing").innerHTML += text.charAt(i);
        i++;
        setTimeout(type, 50);
    }
}
type();

// CURSOR GLOW
const cursor = document.getElementById("cursor");
document.addEventListener("mousemove", e => {
    cursor.style.left = e.clientX + "px";
    cursor.style.top = e.clientY + "px";
});

// PARTICLES
const canvas = document.getElementById("particles");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let particles = [];

for (let i = 0; i < 60; i++) {
    particles.push({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height,
        r: Math.random() * 2
    });
}

function draw() {
    ctx.clearRect(0,0,canvas.width,canvas.height);

    ctx.fillStyle = "red";
    particles.forEach(p => {
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.r, 0, Math.PI*2);
        ctx.fill();
        p.y -= 0.5;
        if (p.y < 0) p.y = canvas.height;
    });

    requestAnimationFrame(draw);
}

draw();
</script>

</body>
</html>
